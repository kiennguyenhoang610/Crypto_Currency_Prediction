<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body { margin: 0; font-family: Poppins, sans-serif; background: #f4f7f6; color: #24323d; }
        .wrap { max-width: 860px; margin: 60px auto; background: #fff; border-radius: 18px; padding: 36px; box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
        h1 { margin: 0 0 18px; color: #299b63; }
        p { line-height: 1.8; color: #55636c; font-size: 16px; }
        a { display: inline-flex; align-items: center; gap: 8px; margin-top: 22px; text-decoration: none; color: #299b63; font-weight: 700; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>{{ heading }}</h1>
        <p>{{ body }}</p>
        <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
