<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login - Crypto Predict</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            color: #299b63; /* Màu xanh lá đồng bộ với Chart.js */
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: #299b63;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #299b63;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background-color: #218251;
        }
        .error-message {
            color: #e74c3c;
            background-color: #fceceb;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .demo-credentials {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="login-container">
		<div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-chart-line" style="font-size: 45px; color: #299b63; margin-bottom: 10px;"></i>
            <h2 style="color: #299b63; font-weight: 800; font-size: 28px; margin: 0; letter-spacing: -0.5px;">CryptoPredict</h2>
            <p style="color: #7f8c8d; font-size: 16px; margin-top: 5px; font-weight: 500;">System Login</p>
        </div>
        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Input username...">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Input password...">
            </div>
			<div style="margin-bottom: 25px; text-align: left;">
				<label for="role" style="font-family: inherit; font-size: 15px; font-weight: 600; color: #333; display: block; margin-bottom: 8px;">Select Role</label>
				<select name="role" id="role" required style="width: 100%; height: 45px; padding: 10px 15px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: inherit; color: #333; background-color: #fff; outline: none; box-sizing: border-box;">
					<option value="user">End User (Investor)</option>
					<option value="admin">System Admin</option>
					<option value="scientist">Data Scientist</option>
				</select>
			</div>
			<button type="submit" class="login-btn">Login</button>
        </form>
        {% if default_passwords %}
        <div class="demo-credentials">
            <strong>Seed accounts</strong><br>
            admin / {{ default_passwords.admin }}<br>
            scientist / {{ default_passwords.scientist }}<br>
            investor / {{ default_passwords.user }}
        </div>
        {% endif %}
    </div>
</body>
</html>
